# =============================================================
# PIPELINE CI/CD - GitHub Actions
# Se ejecuta automáticamente en cada push o pull request
# =============================================================

name: Pipeline CI/CD Completo

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: PRUEBAS (CI - Integración Continua)
  # ─────────────────────────────────────────
  pruebas:
    name: Ejecutar Pruebas
    runs-on: ubuntu-latest

    steps:
      - name: Obtener el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas con cobertura
        run: |
          pytest test_app.py -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v3
        with:
          name: reporte-cobertura
          path: coverage.xml

  # ─────────────────────────────────────────
  # JOB 2: BUILD DOCKER (solo si pruebas pasan)
  # ─────────────────────────────────────────
  build:
    name: Construir Imagen Docker
    runs-on: ubuntu-latest
    needs: pruebas  # ← Depende del job anterior

    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t cicd-practica:${{ github.sha }} .

      - name: Verificar que la imagen funciona
        run: |
          docker run -d --name test-container \
            -p 5000:5000 \
            cicd-practica:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/salud
          docker stop test-container

  # ─────────────────────────────────────────
  # JOB 3: DEPLOY (solo en rama main)
  # ─────────────────────────────────────────
  deploy:
    name: Deploy a Producción
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'  # Solo en main

    steps:
      - uses: actions/checkout@v4

      - name: Simular deploy
        run: |
          echo "🚀 Desplegando versión: ${{ github.sha }}"
          echo "📦 Imagen: cicd-practica:${{ github.sha }}"
          echo "✅ Deploy completado exitosamente"
          echo "🌐 App disponible en producción"
