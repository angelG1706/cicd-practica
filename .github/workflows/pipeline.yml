name: Pipeline CI/CD Completo

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  pruebas:
    name: Ejecutar Pruebas
    runs-on: ubuntu-latest
    steps:
      - name: Obtener el codigo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ejecutar pruebas con cobertura
        run: |
          pytest test_app.py -v --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reporte-cobertura
          path: coverage.xml
          if-no-files-found: ignore

  build:
    name: Construir Imagen Docker
    runs-on: ubuntu-latest
    needs: pruebas
    steps:
      - uses: actions/checkout@v4

      - name: Construir imagen Docker
        run: docker build -t cicd-practica:${{ github.sha }} .

      - name: Verificar que la imagen funciona
        run: |
          docker run -d --name test-container -p 5000:5000 cicd-practica:${{ github.sha }}
          sleep 3
          curl --fail http://localhost:5000/salud
          docker stop test-container

  deploy:
    name: Deploy a Produccion
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Simular deploy
        run: |
          echo "Desplegando version ${{ github.sha }}"
          echo "Deploy completado exitosamente"
          echo "App disponible en produccion"
